{% extends 'base.html' %}
{% block title %}Inscription Hôpital{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="text-danger mb-4">Inscription — Établissement hospitalier</h3>
        <form method="post">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Nom de l'établissement</label>
              <input type="text" name="nom" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Nom d'utilisateur</label>
              <input type="text" name="username" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col-12">
              <label class="form-label">Adresse</label>
              <input type="text" name="adresse" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Ville</label>
              <input type="text" name="ville" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Téléphone</label>
              <input type="text" name="telephone" class="form-control">
            </div>
            <div class="col-12">
              <label class="form-label">Numéro d'agrément</label>
              <input type="text" name="numero_agrement" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Mot de passe</label>
              <input type="password" name="password1" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Confirmer le mot de passe</label>
              <input type="password" name="password2" class="form-control" required>
            </div>
          </div>
          {% if form.errors %}
            <div class="alert alert-danger mt-3">
              {% for field in form %}{% for error in field.errors %}<p class="mb-0">{{ error }}</p>{% endfor %}{% endfor %}
            </div>
          {% endif %}
          <button type="submit" class="btn btn-danger w-100 mt-3">Envoyer la demande</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
