{% extends 'base.html' %}
{% block title %}Enregistrer un don — BloodConnect{% endblock %}

{% block content %}

<div class="page-header fade-up">
  <div>
    <h1>Enregistrer un don</h1>
    <p>Renseignez les informations de votre don de sang.</p>
  </div>
  <a href="{% url 'dashboard_donneur' %}" class="btn btn-ghost">
    <i class="bi bi-arrow-left"></i> Retour
  </a>
</div>

<div class="card fade-up-2" style="max-width:560px; margin:0 auto;">
  <div class="card-header danger">
    <span><i class="bi bi-droplet-fill me-2"></i>Nouveau don</span>
  </div>
  <div class="card-body" style="padding:1.75rem;">
    <form method="post">
      {% csrf_token %}

      <div class="form-group" style="margin-bottom:1.25rem;">
        <label class="form-label" for="hopital">Hôpital / Centre de collecte</label>
        <select name="hopital" id="hopital" class="form-control" required>
          <option value="">-- Choisir un hôpital --</option>
          {% for h in hopitaux %}
            <option value="{{ h.id }}">{{ h.nom }} — {{ h.ville }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group" style="margin-bottom:1.25rem;">
        <label class="form-label" for="date_don">Date du don</label>
        <input type="date" name="date_don" id="date_don" class="form-control"
               max="{{ today }}" required>
      </div>

      <div class="form-group" style="margin-bottom:1.75rem;">
        <label class="form-label" for="notes">Notes (optionnel)</label>
        <textarea name="notes" id="notes" class="form-control" rows="3"
                  placeholder="Remarques, conditions particulières…"></textarea>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;">
        <i class="bi bi-check-circle me-1"></i> Enregistrer le don
      </button>
    </form>
  </div>
</div>

{% endblock %}
