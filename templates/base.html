<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BloodConnect{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-danger">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">🩸 BloodConnect</a>
    <div class="ms-auto d-flex gap-2">
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="{% url 'logout' %}" class="btn btn-light btn-sm">Déconnexion</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Connexion</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
